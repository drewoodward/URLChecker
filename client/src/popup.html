<!DOCTYPE html>
<html>
<head>
    <title>URLChecker</title>
    <style>
        body { width: 300px; padding: 15px; font-family: sans-serif; }
        button { width: 100%; padding: 10px; cursor: pointer; margin-bottom: 10px; }
        #status { margin-top: 10px; color: blue; text-align: center; }
        #history-section { margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; }
        .history-item { font-size: 12px; margin-bottom: 5px; padding: 8px; background: #f9f9f9; border-radius: 4px; word-break: break-all; }
        .history-safe { border-left: 4px solid green; }
        .history-malicious { border-left: 4px solid red; }
        .history-url { font-weight: bold; display: block; margin-bottom: 3px; }
        .history-info { color: #555; }
    </style>
</head>
<body>
    <h2>URLChecker</h2>
    <input type="text" id="url-input" placeholder="Paste URL here..." style="width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box;" />
    <button id="test-btn">Check URL</button>
    <p id="status"></p>

    <div id="history-section">
        <h3>Recent Scans</h3>
        <button id="history-btn">Load History</button>
        <div id="history-list"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
